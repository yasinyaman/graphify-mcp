name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # include the tree-sitter extra so the multi-language backend tests run
          # (they self-skip when it's absent) rather than silently no-op in CI
          pip install -e ".[dev,treesitter]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy)
        run: mypy
      - name: Test (pytest + coverage)
        run: pytest -q --cov --cov-report=term-missing --cov-report=xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore
